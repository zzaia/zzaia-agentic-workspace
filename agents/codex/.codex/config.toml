[mcp_servers.aspire]
command = "aspire"
args = ["agent", "mcp"]

[mcp_servers.headroom]
command = "npx"
args = ["-y", "supergateway", "--streamableHttp", "http://mcp-headroom:3008/mcp"]

[mcp_servers.bifrost]
command = "npx"
args = ["-y", "supergateway", "--streamableHttp", "http://bifrost-server:8080/mcp"]

[hooks.before_tool_use]
command = "if command -v rtk &>/dev/null; then rtk hook claude; else cat; fi"
matcher = "bash"
