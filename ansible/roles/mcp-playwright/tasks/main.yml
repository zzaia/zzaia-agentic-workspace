---
- name: Install Playwright MCP system dependencies
  apt:
    name:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libnotify4
      - libgconf-2-4
      - libgbm1
      - libpulse0
      - libxss1
      - libxtst6
      - xdg-utils
      - fonts-liberation
      - xfonts-encodings
      - xfonts-utils
      - fonts-dejavu-core
      - fonts-liberation
      - fonts-noto-color-emoji
      - libappindicator1
      - libindicator7
    state: present
    update_cache: yes

- name: Install Node.js globally if not present
  shell: |
    npm install -g @playwright/mcp
  environment:
    PATH: "/opt/tools/.npm-global/bin:{{ ansible_env.PATH }}"
  args:
    creates: /opt/tools/.npm-global/lib/node_modules/@playwright/mcp

- name: Create systemd service for mcp-playwright
  copy:
    content: |
      [Unit]
      Description=ZZAIA MCP Playwright Server
      After=network.target

      [Service]
      Type=simple
      User=user
      ExecStart=/opt/tools/.npm-global/bin/node /opt/tools/.npm-global/lib/node_modules/@playwright/mcp/cli.js --headless --browser chromium --port 3006 --host 0.0.0.0 --allowed-hosts "*"
      Restart=on-failure
      RestartSec=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/zzaia-mcp-playwright.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable mcp-playwright service
  systemd:
    name: zzaia-mcp-playwright
    enabled: yes
    daemon_reload: yes
