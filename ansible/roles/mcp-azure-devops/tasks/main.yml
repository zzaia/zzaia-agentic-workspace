---
- name: Verify Node.js availability
  stat:
    path: /opt/tools/.npm-global/bin/npx
  register: npx_stat
  failed_when: not npx_stat.stat.exists
  changed_when: false

- name: Create env file for mcp-azure-devops
  copy:
    content: |
      ADO_MCP_AUTH_TOKEN={{ ado_mcp_auth_token | default('') }}
      AZURE_DEVOPS_ORGANIZATION={{ azure_devops_organization | default('') }}
    dest: /etc/zzaia/mcp-azure-devops.env
    owner: root
    group: root
    mode: '0600'
  notify: restart mcp-azure-devops

- name: Create systemd service for mcp-azure-devops
  copy:
    content: |
      [Unit]
      Description=ZZAIA MCP Azure DevOps Server
      After=network.target

      [Service]
      Type=simple
      User=user
      EnvironmentFile=/etc/zzaia/mcp-azure-devops.env
      ExecStart=/usr/bin/npx -y supergateway@latest --port 3002 --outputTransport streamableHttp --stdio "npx -y @azure-devops/mcp@next ${AZURE_DEVOPS_ORGANIZATION} -a envvar"
      Restart=on-failure
      RestartSec=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/zzaia-mcp-azure-devops.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable mcp-azure-devops service
  systemd:
    name: zzaia-mcp-azure-devops
    enabled: yes
    daemon_reload: yes
