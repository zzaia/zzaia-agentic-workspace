---
- name: Add Neo4j repository key
  apt_key:
    url: https://debian.neo4j.com/neotechnology.gpg.key
    state: present

- name: Add Neo4j repository
  apt_repository:
    repo: deb https://debian.neo4j.com stable latest
    state: present
    filename: neo4j

- name: Install Neo4j 5.14.0
  apt:
    name: neo4j=1:5.14.0
    state: present
    update_cache: yes

- name: Ensure Neo4j configuration directory exists
  file:
    path: /etc/neo4j
    state: directory
    owner: neo4j
    group: neo4j
    mode: '0755'

- name: Configure Neo4j authentication
  lineinfile:
    path: /etc/neo4j/neo4j.conf
    regexp: '^#?dbms\.security\.auth_enabled='
    line: 'dbms.security.auth_enabled=true'
    state: present

- name: Set Neo4j initial password
  shell: |
    neo4j-admin dbms set-initial-password {{ neo4j_admin_password | quote }}
  args:
    executable: /bin/bash
  register: neo4j_password_result
  changed_when: "'password set' in neo4j_password_result.stderr or 'password updated' in neo4j_password_result.stderr"
  failed_when: false

- name: Enable Neo4j service
  systemd:
    name: neo4j
    enabled: yes
    daemon_reload: yes
