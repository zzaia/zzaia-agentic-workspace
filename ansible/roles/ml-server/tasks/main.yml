---
# ml-server role: Install miniforge, create venv-system, install headroom proxy
# References: docker/containers/ml-server/entrypoint.sh

- name: Create installation directories
  file:
    path: "{{ ml_install_prefix }}/.bootstrap"
    state: directory
    mode: "0755"

- name: Check if miniforge already installed
  stat:
    path: "{{ ml_install_prefix }}/miniforge3/bin/conda"
  register: miniforge_check

- name: Download miniforge3
  shell: |
    curl -fsSL "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh" \
      -o /tmp/miniforge.sh
  when: not miniforge_check.stat.exists
  register: miniforge_download

- name: Install miniforge3
  shell: |
    bash /tmp/miniforge.sh -b -p "{{ ml_install_prefix }}/miniforge3"
    "{{ ml_install_prefix }}/miniforge3/bin/conda" init bash
    rm /tmp/miniforge.sh
  when: miniforge_download is changed
  register: miniforge_install

- name: Check if venv-system environment exists
  shell: |
    "{{ ml_install_prefix }}/miniforge3/bin/conda" env list 2>/dev/null | grep -q "^venv-system" && echo "exists" || echo "missing"
  register: venv_system_check
  changed_when: false

- name: Create venv-system conda environment
  shell: |
    "{{ ml_install_prefix }}/miniforge3/bin/conda" create -n venv-system \
      "python={{ python_version }}" pip -y
  when: venv_system_check.stdout == "missing"
  register: venv_system_create

- name: Install base packages to venv-system
  shell: |
    set -e
    PIP="{{ ml_install_prefix }}/miniforge3/envs/venv-system/bin/pip"
    $PIP install --upgrade pip --quiet
    $PIP install \
      "fastapi=={{ fastapi_version }}" \
      "uvicorn=={{ uvicorn_version }}" \
      "httpx[http2]" \
      --quiet
  when: venv_system_check.stdout == "missing" or venv_system_create is changed
  register: base_packages_install

- name: Install GPU/ML packages (torch, headroom-ai[ml])
  shell: |
    set -e
    PIP="{{ ml_install_prefix }}/miniforge3/envs/venv-system/bin/pip"
    $PIP install \
      "torch=={{ torch_version }}" torchvision torchaudio \
      --index-url https://download.pytorch.org/whl/cu121 \
      --quiet || echo "torch install had issues; continuing"
    $PIP install \
      "headroom-ai[ml]{{ '==' + headroom_ai_version if headroom_ai_version else '' }}" \
      --quiet || echo "headroom-ai[ml] had issues; continuing"
  when:
    - gpu_enabled | bool
    - (venv_system_check.stdout == "missing" or base_packages_install is changed)
  register: gpu_packages_install

- name: Install CPU packages (headroom-ai[code])
  shell: |
    set -e
    PIP="{{ ml_install_prefix }}/miniforge3/envs/venv-system/bin/pip"
    $PIP install \
      "headroom-ai[code]{{ '==' + headroom_ai_version if headroom_ai_version else '' }}" \
      --quiet || echo "headroom-ai[code] had issues; continuing"
  when:
    - not (gpu_enabled | bool)
    - (venv_system_check.stdout == "missing" or base_packages_install is changed)
  register: cpu_packages_install

- name: Create headroom systemd service unit
  template:
    src: headroom.service.j2
    dest: /etc/systemd/system/headroom.service
    owner: root
    group: root
    mode: "0644"
  register: headroom_service

- name: Enable and start headroom service
  systemd:
    name: headroom
    daemon_reload: yes
    enabled: yes
    state: started
  when: headroom_service is changed or miniforge_install is changed or venv_system_create is changed
