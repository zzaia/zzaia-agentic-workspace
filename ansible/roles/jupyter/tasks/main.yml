---
# jupyter role: Set up Jupyter Lab with venv-analytics conda environment
# References: docker/containers/jupyter-sidecar/entrypoint.sh

- name: Check if venv-analytics environment exists
  shell: |
    "{{ install_prefix }}/miniforge3/bin/conda" env list 2>/dev/null | grep -q "^venv-analytics" && echo "exists" || echo "missing"
  register: venv_analytics_check
  changed_when: false

- name: Create venv-analytics conda environment
  shell: |
    "{{ install_prefix }}/miniforge3/bin/conda" create -n venv-analytics \
      "python={{ conda_python_version }}" pip -y
  when: venv_analytics_check.stdout == "missing"
  register: venv_analytics_create

- name: Install Jupyter packages to venv-analytics
  shell: |
    set -e
    PIP="{{ install_prefix }}/miniforge3/envs/venv-analytics/bin/pip"
    $PIP install --upgrade pip --quiet
    $PIP install \
      jupyterlab \
      notebook \
      ipykernel \
      jupyter-kernel-gateway \
      --quiet || echo "Jupyter packages had issues; continuing"
  when: venv_analytics_check.stdout == "missing" or venv_analytics_create is changed
  register: jupyter_packages_install

- name: Install data science packages to venv-analytics
  shell: |
    set -e
    PIP="{{ install_prefix }}/miniforge3/envs/venv-analytics/bin/pip"
    $PIP install \
      numpy pandas matplotlib scipy \
      scikit-learn seaborn plotly ipywidgets \
      nbformat \
      --quiet || echo "Data science packages had issues; continuing"
  when: venv_analytics_check.stdout == "missing" or jupyter_packages_install is changed
  register: datascience_packages_install

- name: Register ipykernel
  shell: |
    "{{ install_prefix }}/miniforge3/envs/venv-analytics/bin/python" -m ipykernel install \
      --user --name venv-analytics --display-name "Python (venv-analytics)" \
      2>/dev/null || echo "ipykernel registration had issues"
  when: venv_analytics_check.stdout == "missing" or jupyter_packages_install is changed
  changed_when: false

- name: Install GPU/ML packages to venv-analytics
  shell: |
    set -e
    PIP="{{ install_prefix }}/miniforge3/envs/venv-analytics/bin/pip"
    $PIP install \
      "torch{{ '==' + torch_version if torch_version else '' }}" torchvision torchaudio \
      "headroom-ai[ml]{{ '==' + headroom_ai_version if headroom_ai_version else '' }}" \
      --index-url https://download.pytorch.org/whl/cu121 \
      --quiet || echo "GPU packages had issues; continuing"
  when:
    - gpu_enabled | bool
    - (venv_analytics_check.stdout == "missing" or datascience_packages_install is changed)
  register: gpu_jupyter_packages_install

- name: Create Jupyter notebook directory
  file:
    path: "/home/user/{{ workspace_name }}"
    state: directory
    owner: user
    group: user
    mode: "0755"

- name: Create Jupyter systemd service
  template:
    src: jupyter.service.j2
    dest: /etc/systemd/system/jupyter.service
    owner: root
    group: root
    mode: "0644"
  register: jupyter_service

- name: Enable and start Jupyter service
  systemd:
    name: jupyter
    daemon_reload: yes
    enabled: yes
    state: started
  when: jupyter_service is changed or venv_analytics_create is changed
