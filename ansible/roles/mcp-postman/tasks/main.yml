---
- name: Verify Node.js availability
  stat:
    path: /opt/tools/.npm-global/bin/npx
  register: npx_stat
  failed_when: not npx_stat.stat.exists
  changed_when: false

- name: Create env file for mcp-postman
  copy:
    content: |
      POSTMAN_API_KEY={{ postman_api_key | default('') }}
    dest: /etc/zzaia/mcp-postman.env
    owner: root
    group: root
    mode: '0600'
  notify: restart mcp-postman

- name: Create systemd service for mcp-postman
  copy:
    content: |
      [Unit]
      Description=ZZAIA MCP Postman Server
      After=network.target

      [Service]
      Type=simple
      User=user
      EnvironmentFile=/etc/zzaia/mcp-postman.env
      ExecStart=/usr/bin/npx -y supergateway@latest --port 3003 --outputTransport streamableHttp --stdio "npx -y @postman/postman-mcp-server --minimal --region us"
      Restart=on-failure
      RestartSec=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/zzaia-mcp-postman.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable mcp-postman service
  systemd:
    name: zzaia-mcp-postman
    enabled: yes
    daemon_reload: yes
