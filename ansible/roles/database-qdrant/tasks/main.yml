---
- name: Create qdrant system user
  user:
    name: qdrant
    system: yes
    shell: /usr/sbin/nologin
    home: /var/lib/qdrant

- name: Create Qdrant data directory
  file:
    path: /var/lib/qdrant
    state: directory
    owner: qdrant
    group: qdrant
    mode: '0750'

- name: Download Qdrant release
  get_url:
    url: https://github.com/qdrant/qdrant/releases/download/v1.17.1/qdrant-x86_64-unknown-linux-musl.tar.gz
    dest: /tmp/qdrant-1.17.1.tar.gz
    checksum: sha256:{{ qdrant_checksum | default('') }}
  register: qdrant_download

- name: Extract Qdrant binary
  unarchive:
    src: /tmp/qdrant-1.17.1.tar.gz
    dest: /tmp
    remote_src: yes
    creates: /tmp/qdrant

- name: Install Qdrant binary
  copy:
    src: /tmp/qdrant
    dest: /usr/local/bin/qdrant
    owner: root
    group: root
    mode: '0755'
    remote_src: yes

- name: Create Qdrant config directory
  file:
    path: /etc/qdrant
    state: directory
    owner: qdrant
    group: qdrant
    mode: '0755'

- name: Create systemd service for Qdrant
  copy:
    content: |
      [Unit]
      Description=ZZAIA Qdrant Vector Database
      After=network.target

      [Service]
      Type=simple
      User=qdrant
      Group=qdrant
      WorkingDirectory=/var/lib/qdrant
      ExecStart=/usr/local/bin/qdrant --uri http://0.0.0.0:6333
      Restart=on-failure
      RestartSec=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/zzaia-database-qdrant.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable Qdrant service
  systemd:
    name: zzaia-database-qdrant
    enabled: yes
    daemon_reload: yes

- name: Clean up temporary files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/qdrant-1.17.1.tar.gz
    - /tmp/qdrant
