---
- name: Verify Node.js availability
  stat:
    path: /opt/tools/.npm-global/bin/npx
  register: npx_stat
  failed_when: not npx_stat.stat.exists
  changed_when: false

- name: Create env file for mcp-tavily
  copy:
    content: |
      TAVILY_API_KEY={{ tavily_api_key | default('') }}
    dest: /etc/zzaia/mcp-tavily.env
    owner: root
    group: root
    mode: '0600'
  notify: restart mcp-tavily

- name: Create systemd service for mcp-tavily
  copy:
    content: |
      [Unit]
      Description=ZZAIA MCP Tavily Server
      After=network.target

      [Service]
      Type=simple
      User=user
      EnvironmentFile=/etc/zzaia/mcp-tavily.env
      ExecStart=/usr/bin/npx -y supergateway@latest --port 3001 --outputTransport streamableHttp --stdio "npx -y tavily-mcp@latest"
      Restart=on-failure
      RestartSec=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/zzaia-mcp-tavily.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Enable mcp-tavily service
  systemd:
    name: zzaia-mcp-tavily
    enabled: yes
    daemon_reload: yes
