# ZZAIA Workspace — Local Docker deployment
# workspace-server is the authoritative container: tools, SSH, shared home.
# vscode-server and containers-dev-server depend on workspace-server being healthy.
name: ${WORKSPACE_NAME:-zzaia}

services:
  dind:
    image: docker:28.1.1-dind
    runtime: runc
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind-storage:/var/lib/docker
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  workspace-server:
    build:
      context: ..
      dockerfile: docker/containers/workspace-server/Dockerfile
      args:
        SSH_PORT: ${SSH_PORT:-2222}
    image: zzaia-workspace-server:latest
    ports:
      - "127.0.0.1:${SSH_PORT:-2222}:${SSH_PORT:-2222}"
    volumes:
      - workspace-secrets:/secrets
      - workspace-home:/home/user
      - workspace-tools:/opt/tools
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME:-zzaia}
      - INSTALL_PREFIX=/opt/tools
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SSH_PORT=${SSH_PORT:-2222}
      - VSCODE_PORT=${VSCODE_PORT:-8080}
      - DOCKER_HOST=tcp://dind:2375
      - GPU_ENABLED=${GPU_ENABLED:-false}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - ANTHROPIC_BEDROCK_BASE_URL=${ANTHROPIC_BEDROCK_BASE_URL:-}
      - CLAUDE_CODE_USE_VERTEX=${CLAUDE_CODE_USE_VERTEX:-}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID:-}
      - CLOUD_ML_REGION=${CLOUD_ML_REGION:-}
      - CLAUDE_CODE_USE_FOUNDRY=${CLAUDE_CODE_USE_FOUNDRY:-}
      - AZURE_FOUNDRY_BASE_URL=${AZURE_FOUNDRY_BASE_URL:-}
      - ASPIRE_ALLOW_UNSECURED_TRANSPORT=true
      - ANTHROPIC_BASE_URL=http://ml-server:8787
      - OPENAI_BASE_URL=http://ml-server:8787
      - GEMINI_API_BASE=http://ml-server:8787
    networks:
      - mcp
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /tmp:mode=1777
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    healthcheck:
      test: ["CMD-SHELL", "[ -f /opt/tools/.bootstrap/tools.ready ] && bash -c \"</dev/tcp/localhost/$(cat /etc/ssh-port 2>/dev/null || echo 2222)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30m
    depends_on:
      dind:
        condition: service_healthy
      ml-server:
        condition: service_healthy
      mcp-playwright:
        condition: service_healthy
      mcp-headroom:
        condition: service_healthy

  ml-server:
    build:
      context: ..
      dockerfile: docker/containers/ml-server/Dockerfile
    image: zzaia-ml-server:latest
    environment:
      - GPU_ENABLED=${GPU_ENABLED:-false}
      - INSTALL_PREFIX=/opt/ml-tools
      - VERSIONS_FILE=/opt/scripts/versions.env
      - QDRANT_URL=http://database-qdrant:6333
      - NEO4J_URI=bolt://database-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${ADMIN_PASSWORD:-}
      - PORT=8787
      - HEADROOM_TELEMETRY=off
    volumes:
      - workspace-home:/workspace:ro
      - ml-tools:/opt/ml-tools
    networks:
      - mcp
    restart: unless-stopped
    depends_on:
      database-qdrant:
        condition: service_started
      database-neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15m

  database-qdrant:
    build:
      context: ..
      dockerfile: docker/containers/database-qdrant/Dockerfile
    image: zzaia-qdrant:v1.17.1
    volumes:
      - headroom-qdrant:/qdrant/storage
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  database-neo4j:
    build:
      context: ..
      dockerfile: docker/containers/database-neo4j/Dockerfile
    image: zzaia-neo4j:5.15.0
    environment:
      - NEO4J_AUTH=neo4j/${ADMIN_PASSWORD:-zzaia1234}
    volumes:
      - headroom-neo4j:/data
    tmpfs:
      - /logs
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  mcp-tavily:
    build:
      context: ..
      dockerfile: docker/containers/mcp-tavily/Dockerfile
    image: zzaia-mcp-tavily:latest
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$TAVILY_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3001,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-azure-devops:
    build:
      context: ..
      dockerfile: docker/containers/mcp-azure-devops/Dockerfile
    image: zzaia-mcp-azure-devops:latest
    environment:
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$ADO_MCP_AUTH_TOKEN\" ] || [ -z \"$$AZURE_DEVOPS_ORGANIZATION\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3002,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-postman:
    build:
      context: ..
      dockerfile: docker/containers/mcp-postman/Dockerfile
    image: zzaia-mcp-postman:latest
    environment:
      - POSTMAN_API_KEY=${POSTMAN_API_KEY:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$POSTMAN_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3003,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-newrelic:
    build:
      context: ..
      dockerfile: docker/containers/mcp-newrelic/Dockerfile
    image: zzaia-mcp-newrelic:latest
    environment:
      - NEW_RELIC_API_KEY=${NEW_RELIC_API_KEY:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$NEW_RELIC_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3004,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-github:
    build:
      context: ..
      dockerfile: docker/containers/mcp-github/Dockerfile
    image: zzaia-mcp-github:latest
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$GITHUB_PERSONAL_ACCESS_TOKEN\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3005,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-playwright:
    build:
      context: ..
      dockerfile: docker/containers/mcp-playwright/Dockerfile
    image: zzaia-mcp-playwright:latest
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3006,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-headroom:
    build:
      context: ..
      dockerfile: docker/containers/mcp-headroom/Dockerfile
    image: zzaia-mcp-headroom:latest
    environment:
      - HEADROOM_TELEMETRY=off
    networks:
      - mcp
    restart: unless-stopped
    depends_on:
      ml-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3008,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  vscode-server:
    build:
      context: ..
      dockerfile: docker/containers/vscode-server/Dockerfile
      args:
        VSCODE_PORT: ${VSCODE_PORT:-8080}
    image: zzaia-vscode-server:latest
    profiles: ["vscode"]
    user: root
    ports:
      - "127.0.0.1:${VSCODE_PORT:-8080}:${VSCODE_PORT:-8080}"
      - "127.0.0.1:${ASPIRE_DASHBOARD_PORT:-18890}:17001"
    volumes:
      - workspace-home:/home/user
      - workspace-tools:/opt/tools:ro
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME:-zzaia}
      - VSCODE_PORT=${VSCODE_PORT:-8080}
      - DOCKER_HOST=tcp://dind:2375
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - ANTHROPIC_BEDROCK_BASE_URL=${ANTHROPIC_BEDROCK_BASE_URL:-}
      - ANTHROPIC_BASE_URL=http://ml-server:8787
      - OPENAI_BASE_URL=http://ml-server:8787
      - GEMINI_API_BASE=http://ml-server:8787
      - ASPIRE_ALLOW_UNSECURED_TRANSPORT=true
    networks:
      - mcp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${VSCODE_PORT:-8080}/ >/dev/null && [ -f /home/user/.vscode-server/.extensions-installed ]"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30m
    depends_on:
      workspace-server:
        condition: service_healthy

  containers-dev-server:
    build:
      context: ..
      dockerfile: docker/containers/containers-dev-server/Dockerfile
    image: zzaia-containers-dev-server:latest
    profiles: ["devcontainer"]
    volumes:
      - workspace-home:/home/user
      - workspace-tools:/opt/tools:ro
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME:-zzaia}
      - DOCKER_HOST=tcp://dind:2375
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - ANTHROPIC_BASE_URL=http://ml-server:8787
      - OPENAI_BASE_URL=http://ml-server:8787
      - GEMINI_API_BASE=http://ml-server:8787
    networks:
      - mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    healthcheck:
      test: ["CMD-SHELL", "[ -f /opt/tools/.bootstrap/tools.ready ]"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30m
    depends_on:
      workspace-server:
        condition: service_healthy

volumes:
  workspace-secrets:
    name: ${WORKSPACE_NAME:-zzaia}-secrets
  workspace-home:
    name: ${WORKSPACE_NAME:-zzaia}-home
  workspace-tools:
    name: ${WORKSPACE_NAME:-zzaia}-tools
  ml-tools:
    name: ${WORKSPACE_NAME:-zzaia}-ml-tools
  headroom-qdrant:
    name: ${WORKSPACE_NAME:-zzaia}-headroom-qdrant
  headroom-neo4j:
    name: ${WORKSPACE_NAME:-zzaia}-headroom-neo4j
  dind-storage:
    name: ${WORKSPACE_NAME:-zzaia}-dind-storage

networks:
  mcp:
    driver: bridge
