# ZZAIA Workspace — Local Docker deployment
# Usage:
#   export SSH_PUBLIC_KEY="$(cat ~/.ssh/id_ed25519.pub)"
#   docker compose -f docker/docker-compose.yml up -d
#   ssh -p 2222 zzaia@localhost
services:
  zzaia:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: zzaia-workspace:latest
    container_name: zzaia-workspace
    ports:
      - "2222:2222"
    environment:
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:?Set SSH_PUBLIC_KEY to your public key contents}
    # ── Isolation — no host filesystem, network, or device access ──────────
    network_mode: bridge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE   # sshd logging
      - CHOWN         # sshd file ownership operations
      - FOWNER        # sshd filesystem operations
      - SETGID        # sshd user switching
      - SETUID        # sshd user switching
    tmpfs:
      - /run
      - /tmp:mode=1777
    restart: unless-stopped
