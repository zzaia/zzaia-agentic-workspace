# ZZAIA Workspace — Local Docker deployment
# First start: fill in variables and run docker compose up -d (see QUICKSTART.md).
# Subsequent starts: Docker Desktop or `docker compose -p <workspace> start`.
# Multiple workspaces: set different WORKSPACE_NAME, VSCODE_PORT, SSH_PORT per stack.
name: ${WORKSPACE_NAME:-zzaia}

services:
  workspace:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SSH_PORT: ${SSH_PORT:-2222}
        VSCODE_PORT: ${VSCODE_PORT:-8080}
    image: zzaia-agentic-workspace:latest
    ports:
      - "127.0.0.1:${SSH_PORT:-2222}:${SSH_PORT:-2222}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # full host Docker access — local dev only
      - workspace-secrets:/secrets
      - workspace-home:/home/user
      - workspace-repos:/home/user/workspace
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME:-zzaia}
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - VSCODE_PORT=${VSCODE_PORT:-8080}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - ANTHROPIC_BEDROCK_BASE_URL=${ANTHROPIC_BEDROCK_BASE_URL:-}
      - CLAUDE_CODE_USE_VERTEX=${CLAUDE_CODE_USE_VERTEX:-}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID:-}
      - CLOUD_ML_REGION=${CLOUD_ML_REGION:-}
      - CLAUDE_CODE_USE_FOUNDRY=${CLAUDE_CODE_USE_FOUNDRY:-}
      - AZURE_FOUNDRY_BASE_URL=${AZURE_FOUNDRY_BASE_URL:-}
      - ASPIRE_ALLOW_UNSECURED_TRANSPORT=true
      - ANTHROPIC_BASE_URL=http://proxy-headroom:8787
      - OPENAI_BASE_URL=http://proxy-headroom:8787
      - GEMINI_API_BASE=http://proxy-headroom:8787
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - mcp
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /tmp:mode=1777
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"</dev/tcp/localhost/${SSH_PORT:-2222}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      proxy-headroom:
        condition: service_healthy
      mcp-tavily:
        condition: service_started
      mcp-azure-devops:
        condition: service_started
      mcp-postman:
        condition: service_started
      mcp-newrelic:
        condition: service_started
      mcp-github:
        condition: service_started
      mcp-playwright:
        condition: service_healthy

  proxy-headroom:
    image: ghcr.io/chopratejas/headroom:latest
    command: ["--host", "0.0.0.0", "--port", "8787", "--memory", "--code-graph"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - QDRANT_URL=http://database-qdrant:6333
      - NEO4J_URI=bolt://database-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${ADMIN_PASSWORD:-headroom}
      - PORT=8787
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - workspace-repos:/workspace
    networks:
      - mcp
    restart: unless-stopped
    depends_on:
      database-qdrant:
        condition: service_started
      database-neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  database-qdrant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.qdrant
    image: zzaia-qdrant:v1.17.1
    volumes:
      - headroom-qdrant:/qdrant/storage
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  database-neo4j:
    image: neo4j:5.15.0
    environment:
      - NEO4J_AUTH=neo4j/${ADMIN_PASSWORD:-headroom}
    volumes:
      - headroom-neo4j:/data
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  mcp-tavily:
    image: node:lts-alpine
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    command:
      - sh
      - -c
      - >-
        [ -z "$$TAVILY_API_KEY" ]
        && echo "TAVILY_API_KEY not set — mcp-tavily idle." && trap 'exit 0' TERM INT; while :; do sleep 3600; done ;
        npx -y supergateway@latest --port 3001 --outputTransport streamableHttp --stateful --stdio "npx -y tavily-mcp@latest"
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$TAVILY_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3001,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-azure-devops:
    image: node:lts-alpine
    environment:
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
    command:
      - sh
      - -c
      - >-
        [ -z "$$ADO_MCP_AUTH_TOKEN" ]
        && echo "ADO_MCP_AUTH_TOKEN not set — mcp-azure-devops idle." && trap 'exit 0' TERM INT; while :; do sleep 3600; done ;
        [ -z "$$AZURE_DEVOPS_ORGANIZATION" ]
        && echo "AZURE_DEVOPS_ORGANIZATION not set — mcp-azure-devops idle." && trap 'exit 0' TERM INT; while :; do sleep 3600; done ;
        npx -y supergateway@latest --port 3002 --outputTransport streamableHttp --stateful
        --stdio "npx -y @azure-devops/mcp@next $$AZURE_DEVOPS_ORGANIZATION -a envvar"
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$ADO_MCP_AUTH_TOKEN\" ] || [ -z \"$$AZURE_DEVOPS_ORGANIZATION\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3002,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-postman:
    image: node:lts-alpine
    environment:
      - POSTMAN_API_KEY=${POSTMAN_API_KEY:-}
    command:
      - sh
      - -c
      - >-
        [ -z "$$POSTMAN_API_KEY" ]
        && echo "POSTMAN_API_KEY not set — mcp-postman idle." && trap 'exit 0' TERM INT; while :; do sleep 3600; done ;
        npx -y supergateway@latest --port 3003 --outputTransport streamableHttp --stateful
        --stdio "npx -y @postman/postman-mcp-server --minimal --region us"
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$POSTMAN_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3003,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-newrelic:
    image: node:lts-alpine
    environment:
      - NEW_RELIC_API_KEY=${NEW_RELIC_API_KEY:-}
    command:
      - sh
      - -c
      - >-
        [ -z "$$NEW_RELIC_API_KEY" ]
        && echo "NEW_RELIC_API_KEY not set — mcp-newrelic idle." && trap 'exit 0' TERM INT; while :; do sleep 3600; done ;
        npx -y supergateway@latest --port 3004 --outputTransport streamableHttp --stateful
        --stdio "npx -y mcp-remote@latest https://mcp.newrelic.com/mcp/ --header \"Api-Key: $$NEW_RELIC_API_KEY\""
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$NEW_RELIC_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3004,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-github:
    image: node:lts-alpine
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    command:
      - sh
      - -c
      - >-
        [ -z "$$GITHUB_PERSONAL_ACCESS_TOKEN" ]
        && echo "GITHUB_PERSONAL_ACCESS_TOKEN not set — mcp-github idle." && trap 'exit 0' TERM INT; while :; do sleep 3600; done ;
        npx -y supergateway@latest --port 3005 --outputTransport streamableHttp --stateful
        --stdio "npx -y mcp-remote@latest https://api.githubcopilot.com/mcp/ --header \"Authorization: Bearer $$GITHUB_PERSONAL_ACCESS_TOKEN\""
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$GITHUB_PERSONAL_ACCESS_TOKEN\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3005,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-playwright:
    image: mcr.microsoft.com/playwright/mcp:latest
    entrypoint: ["node", "/app/cli.js"]
    command: ["--headless", "--browser", "chromium", "--port", "3006", "--host", "0.0.0.0"]
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3006,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  vscode-server:
    image: zzaia-agentic-workspace:latest
    user: root
    entrypoint: []
    command:
      - bash
      - -c
      - |
        export PATH=/home/user/.local/share/mise/shims:/home/user/.local/bin:$PATH
        export BROWSER=/usr/local/bin/browser-print
        exec code serve-web \
          --host 0.0.0.0 \
          --port ${VSCODE_PORT:-8080} \
          --without-connection-token \
          --accept-server-license-terms \
          --server-data-dir /home/user/.vscode-server \
          --default-workspace /home/user/${WORKSPACE_NAME:-zzaia}.code-workspace
    ports:
      - "127.0.0.1:${VSCODE_PORT:-8080}:${VSCODE_PORT:-8080}"
      - "127.0.0.1:${ASPIRE_DASHBOARD_PORT:-18890}:17001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-home:/home/user
      - workspace-repos:/home/user/workspace
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME:-zzaia}
      - VSCODE_PORT=${VSCODE_PORT:-8080}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - ANTHROPIC_BEDROCK_BASE_URL=${ANTHROPIC_BEDROCK_BASE_URL:-}
      - ANTHROPIC_BASE_URL=http://proxy-headroom:8787
      - OPENAI_BASE_URL=http://proxy-headroom:8787
      - GEMINI_API_BASE=http://proxy-headroom:8787
      - ASPIRE_ALLOW_UNSECURED_TRANSPORT=true
    networks:
      - mcp
    restart: unless-stopped
    depends_on:
      workspace:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${VSCODE_PORT:-8080}/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  workspace-secrets:
    name: ${WORKSPACE_NAME:-zzaia}-secrets
  workspace-home:
    name: ${WORKSPACE_NAME:-zzaia}-home
  workspace-repos:
    name: ${WORKSPACE_NAME:-zzaia}-workspace
  headroom-qdrant:
    name: ${WORKSPACE_NAME:-zzaia}-headroom-qdrant
  headroom-neo4j:
    name: ${WORKSPACE_NAME:-zzaia}-headroom-neo4j

networks:
  mcp:
    driver: bridge
