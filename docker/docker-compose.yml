# ZZAIA Workspace — Local Docker deployment
# First start: pass SSH_PUBLIC_KEY via env var (saved to ~/.config/zzaia/.env on host)
# MCP secrets: set per-service vars in docker/.env or pass -e at runtime
services:
  zzaia:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: zzaia-workspace:latest
    container_name: zzaia-workspace
    ports:
      - "127.0.0.1:2222:2222"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # full host Docker access — local dev only
      - ~/.config/zzaia:/secrets
      - ./host:/home/zzaia/host
    environment:
      - SSH_PUBLIC_KEY
    networks:
      - mcp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /tmp:mode=1777
    restart: unless-stopped
    depends_on:
      - mcp-tavily
      - mcp-azure-devops
      - mcp-postman
      - mcp-newrelic

  mcp-tavily:
    image: node:lts-alpine
    environment:
      - TAVILY_API_KEY
    command:
      - npx
      - -y
      - supergateway@latest
      - --port
      - "3001"
      - --stdio
      - npx -y tavily-mcp@latest
    networks:
      - mcp
    restart: unless-stopped

  mcp-azure-devops:
    image: node:lts-alpine
    environment:
      - ADO_MCP_AUTH_TOKEN
      - AZURE_DEVOPS_ORGANIZATION
    command:
      - sh
      - -c
      - >-
        npx -y supergateway@latest --port 3002
        --stdio "npx -y @azure-devops/mcp@next $$AZURE_DEVOPS_ORGANIZATION -a envvar"
    networks:
      - mcp
    restart: unless-stopped

  mcp-postman:
    image: node:lts-alpine
    environment:
      - POSTMAN_API_KEY
    command:
      - npx
      - -y
      - supergateway@latest
      - --port
      - "3003"
      - --stdio
      - npx -y @postman/postman-mcp-server --minimal --region us
    networks:
      - mcp
    restart: unless-stopped

  mcp-newrelic:
    image: node:lts-alpine
    environment:
      - NEW_RELIC_API_KEY
    command:
      - sh
      - -c
      - >-
        npx -y supergateway@latest --port 3004
        --stdio "npx -y mcp-remote@latest https://mcp.newrelic.com/mcp/ --transport http-only --header \"Api-Key: $$NEW_RELIC_API_KEY\""
    networks:
      - mcp
    restart: unless-stopped

networks:
  mcp:
    driver: bridge
