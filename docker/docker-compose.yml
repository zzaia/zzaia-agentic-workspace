# ZZAIA Workspace — Local Docker deployment
# First start: fill in variables and run docker compose up -d (see QUICKSTART.md).
# Subsequent starts: Docker Desktop or `docker compose -p <workspace> start`.
# Multiple workspaces: set different WORKSPACE_NAME, VSCODE_PORT, SSH_PORT per stack.
name: ${WORKSPACE_NAME:-zzaia}

services:
  workspace:
    build:
      context: ..
      dockerfile: docker/containers/workspace/Dockerfile
      args:
        SSH_PORT: ${SSH_PORT:-2222}
        VSCODE_PORT: ${VSCODE_PORT:-8080}
    image: zzaia-agentic-workspace:latest
    ports:
      - "127.0.0.1:${SSH_PORT:-2222}:${SSH_PORT:-2222}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # full host Docker access — local dev only
      - workspace-secrets:/secrets
      - workspace-home:/home/user
      - workspace-repos:/home/user/workspace
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME:-zzaia}
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - VSCODE_PORT=${VSCODE_PORT:-8080}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - ANTHROPIC_BEDROCK_BASE_URL=${ANTHROPIC_BEDROCK_BASE_URL:-}
      - CLAUDE_CODE_USE_VERTEX=${CLAUDE_CODE_USE_VERTEX:-}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID:-}
      - CLOUD_ML_REGION=${CLOUD_ML_REGION:-}
      - CLAUDE_CODE_USE_FOUNDRY=${CLAUDE_CODE_USE_FOUNDRY:-}
      - AZURE_FOUNDRY_BASE_URL=${AZURE_FOUNDRY_BASE_URL:-}
      - ASPIRE_ALLOW_UNSECURED_TRANSPORT=true
      - ANTHROPIC_BASE_URL=http://proxy-headroom:8787
      - OPENAI_BASE_URL=http://proxy-headroom:8787
      - GEMINI_API_BASE=http://proxy-headroom:8787
    networks:
      - mcp
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /tmp:mode=1777
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ -f /home/user/.bootstrap/tools.ready ] && bash -c \"</dev/tcp/localhost/${SSH_PORT:-2222}\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30m
    depends_on:
      proxy-headroom:
        condition: service_healthy
      mcp-playwright:
        condition: service_healthy
      mcp-headroom:
        condition: service_healthy

  proxy-headroom:
    build:
      context: ..
      dockerfile: docker/containers/proxy-headroom/Dockerfile
    image: zzaia-proxy-headroom:latest
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - QDRANT_URL=http://database-qdrant:6333
      - NEO4J_URI=bolt://database-neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${ADMIN_PASSWORD:-}
      - PORT=8787
      - HEADROOM_TELEMETRY=off
    volumes:
      - workspace-repos:/workspace
    networks:
      - mcp
    restart: unless-stopped
    depends_on:
      database-qdrant:
        condition: service_started
      database-neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  database-qdrant:
    build:
      context: ..
      dockerfile: docker/containers/database-qdrant/Dockerfile
    image: zzaia-qdrant:v1.17.1
    volumes:
      - headroom-qdrant:/qdrant/storage
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  database-neo4j:
    build:
      context: ..
      dockerfile: docker/containers/database-neo4j/Dockerfile
    image: zzaia-neo4j:5.15.0
    environment:
      - NEO4J_AUTH=neo4j/${ADMIN_PASSWORD:-}
    volumes:
      - headroom-neo4j:/data
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s

  mcp-tavily:
    build:
      context: ..
      dockerfile: docker/containers/mcp-tavily/Dockerfile
    image: zzaia-mcp-tavily:latest
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$TAVILY_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3001,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-azure-devops:
    build:
      context: ..
      dockerfile: docker/containers/mcp-azure-devops/Dockerfile
    image: zzaia-mcp-azure-devops:latest
    environment:
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$ADO_MCP_AUTH_TOKEN\" ] || [ -z \"$$AZURE_DEVOPS_ORGANIZATION\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3002,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-postman:
    build:
      context: ..
      dockerfile: docker/containers/mcp-postman/Dockerfile
    image: zzaia-mcp-postman:latest
    environment:
      - POSTMAN_API_KEY=${POSTMAN_API_KEY:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$POSTMAN_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3003,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-newrelic:
    build:
      context: ..
      dockerfile: docker/containers/mcp-newrelic/Dockerfile
    image: zzaia-mcp-newrelic:latest
    environment:
      - NEW_RELIC_API_KEY=${NEW_RELIC_API_KEY:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$NEW_RELIC_API_KEY\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3004,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-github:
    build:
      context: ..
      dockerfile: docker/containers/mcp-github/Dockerfile
    image: zzaia-mcp-github:latest
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -z \"$$GITHUB_PERSONAL_ACCESS_TOKEN\" ]; then exit 0; fi; node -e \"const net=require('net');const s=net.connect(3005,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mcp-playwright:
    build:
      context: ..
      dockerfile: docker/containers/mcp-playwright/Dockerfile
    image: zzaia-mcp-playwright:latest
    networks:
      - mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3006,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-headroom:
    build:
      context: ..
      dockerfile: docker/containers/mcp-headroom/Dockerfile
    image: zzaia-mcp-headroom:latest
    environment:
      - HEADROOM_TELEMETRY=off
    networks:
      - mcp
    restart: unless-stopped
    depends_on:
      proxy-headroom:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3008,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  vscode-server:
    image: zzaia-agentic-workspace:latest
    profiles: ["vscode"]
    user: root
    entrypoint: []
    command: ["/usr/local/bin/start-vscode-server.sh"]
    ports:
      - "127.0.0.1:${VSCODE_PORT:-8080}:${VSCODE_PORT:-8080}"
      - "127.0.0.1:${ASPIRE_DASHBOARD_PORT:-18890}:17001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-home:/home/user
      - workspace-repos:/home/user/workspace
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME:-zzaia}
      - VSCODE_PORT=${VSCODE_PORT:-8080}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
      - ADO_MCP_AUTH_TOKEN=${ADO_MCP_AUTH_TOKEN:-}
      - AZURE_DEVOPS_ORGANIZATION=${AZURE_DEVOPS_ORGANIZATION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - ANTHROPIC_BEDROCK_BASE_URL=${ANTHROPIC_BEDROCK_BASE_URL:-}
      - ANTHROPIC_BASE_URL=http://proxy-headroom:8787
      - OPENAI_BASE_URL=http://proxy-headroom:8787
      - GEMINI_API_BASE=http://proxy-headroom:8787
      - ASPIRE_ALLOW_UNSECURED_TRANSPORT=true
    networks:
      - mcp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    depends_on:
      workspace:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${VSCODE_PORT:-8080}/ >/dev/null && [ -f /home/user/.vscode-server/.extensions-installed ]"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30m

volumes:
  workspace-secrets:
    name: ${WORKSPACE_NAME:-zzaia}-secrets
  workspace-home:
    name: ${WORKSPACE_NAME:-zzaia}-home
  workspace-repos:
    name: ${WORKSPACE_NAME:-zzaia}-workspace
  headroom-qdrant:
    name: ${WORKSPACE_NAME:-zzaia}-headroom-qdrant
  headroom-neo4j:
    name: ${WORKSPACE_NAME:-zzaia}-headroom-neo4j

networks:
  mcp:
    driver: bridge
