# ZZAIA Workspace — Local Docker deployment
# First start: pass secrets as env vars (saved to ~/.config/zzaia/.env on host)
# Subsequent starts: secrets reload from volume automatically
services:
  zzaia:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: zzaia-workspace:latest
    container_name: zzaia-workspace
    ports:
      - "127.0.0.1:2222:2222"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # full host Docker access — local dev only
      - ~/.config/zzaia:/secrets
      - ./host:/home/zzaia/host
    network_mode: bridge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /tmp:mode=1777
    restart: unless-stopped
