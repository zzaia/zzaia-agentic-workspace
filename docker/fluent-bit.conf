[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    storage.path  /var/lib/fluent-bit/state/flb-storage/
    storage.sync  normal
    storage.checksum off
    storage.max_chunks_up 128
    storage.backlog.mem_limit 5M

[INPUT]
    Name          tail
    Path          /var/lib/docker/containers/*/*.log
    Parser        docker
    Tag           docker.<container_id>
    Tag_Regex     /var/lib/docker/containers/(?<container_id>[^/]+)/.+\.log
    DB            /var/lib/fluent-bit/state/flb_docker.db
    DB.Sync       Off
    Refresh_Interval 10
    Mem_Buf_Limit 50MB
    Skip_Long_Lines On

# Enrich each record with container_name via Docker's config.v2.json (cached in Lua)
[FILTER]
    Name    lua
    Match   docker.*
    script  /fluent-bit/etc/fluent-bit-docker-meta.lua
    call    add_container_meta

# Only forward logs from this workspace's containers (isolates multi-stack hosts)
[FILTER]
    Name    grep
    Match   docker.*
    Regex   container_name ^/${WORKSPACE_NAME}-

[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        docker
    Reserve_Data  On

[OUTPUT]
    Name                 opentelemetry
    Match                *
    Host                 signoz-otel-collector
    Port                 4318
    Logs_uri             /v1/logs
    Log_response_payload True
    tls                  Off
    tls.verify           Off
    add_label            service.name $container_name
    add_label            container.name $container_name
