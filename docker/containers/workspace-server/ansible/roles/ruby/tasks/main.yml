---
# Ruby installation via rbenv

- meta: end_role
  when: not (ruby_enabled | bool)

- name: Install Ruby build dependencies
  ansible.builtin.apt:
    name: ["libssl-dev", "libreadline-dev", "zlib1g-dev", "libffi-dev", "libyaml-dev"]
    state: present
    update_cache: yes
  become: yes
  become_user: root

- name: Create rbenv directory
  ansible.builtin.file:
    path: "{{ install_prefix }}/.rbenv"
    owner: user
    group: user
    mode: "0755"
    state: directory

- name: Clone rbenv repository
  ansible.builtin.shell: |
    git clone https://github.com/rbenv/rbenv.git {{ install_prefix }}/.rbenv
  args:
    creates: "{{ install_prefix }}/.rbenv/bin/rbenv"
    executable: /bin/bash
  environment:
    HOME: /home/user
    GIT_CONFIG_GLOBAL: /dev/null
  changed_when: false

- name: Clone ruby-build plugin
  ansible.builtin.shell: |
    mkdir -p {{ install_prefix }}/.rbenv/plugins
    git clone https://github.com/rbenv/ruby-build.git {{ install_prefix }}/.rbenv/plugins/ruby-build
  args:
    creates: "{{ install_prefix }}/.rbenv/plugins/ruby-build/bin/ruby-build"
    executable: /bin/bash
  environment:
    HOME: /home/user
    GIT_CONFIG_GLOBAL: /dev/null
  changed_when: false

- name: Install Ruby
  ansible.builtin.shell: |
    export PATH="{{ install_prefix }}/.rbenv/bin:$PATH"
    rbenv install {{ ruby_version }} 2>&1 || true
    rbenv global {{ ruby_version }}
  args:
    executable: /bin/bash
  environment:
    HOME: /home/user
    RBENV_ROOT: "{{ install_prefix }}/.rbenv"
    RUBY_CONFIGURE_OPTS: "--with-openssl-dir=/usr --with-readline-dir=/usr --with-zlib-dir=/usr"
  changed_when: false
