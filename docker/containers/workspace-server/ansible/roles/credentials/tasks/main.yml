---
# Credentials and authentication setup

- name: Apply WORKSPACE_NAME templating
  block:
    - name: Get WORKSPACE_NAME from environment
      ansible.builtin.set_fact:
        ws_name: "{{ lookup('env', 'WORKSPACE_NAME') | default(workspace_name) }}"

    - name: Template WORKSPACE_NAME in configuration files
      ansible.builtin.shell: |
        find /home/user /home/user/.vscode-server /home/user/workspace \
            \( -name "*.json" -o -name "*.code-workspace" \) -maxdepth 4 2>/dev/null \
            | xargs sed -i "s/{{ '{{' }}WORKSPACE_NAME{{ '}}' }}/{{ ws_name }}/g" 2>/dev/null || true
      changed_when: false

    - name: Rename workspace file
      ansible.builtin.shell: |
        for ws in /home/user/*.code-workspace; do
            [ -f "$ws" ] || continue
            target="/home/user/{{ ws_name }}.code-workspace"
            [ "$ws" = "$target" ] || mv "$ws" "$target" 2>/dev/null || true
        done
      changed_when: false

- name: Install Claude Code plugins
  ansible.builtin.shell: |
    export HOME=/home/user
    export NVM_DIR={{ install_prefix }}/.nvm
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    export PATH={{ install_prefix }}/.local/bin:{{ install_prefix }}/.npm-global/bin:{{ install_prefix }}/.dotnet:{{ install_prefix }}/.dotnet/tools:{{ install_prefix }}/miniforge3/bin:$PATH

    claude plugin marketplace add https://github.com/zzaia/zzaia-agentic-workspace.git#feature/improve-agentic-system 2>/dev/null || true
    claude plugin install agentic-workspace@zzaia 2>/dev/null || true
  args:
    executable: /bin/bash
  environment:
    NVM_DIR: "{{ install_prefix }}/.nvm"
    PATH: "{{ install_prefix }}/.local/bin:{{ install_prefix }}/.npm-global/bin:{{ install_prefix }}/.dotnet:{{ install_prefix }}/.dotnet/tools:{{ install_prefix }}/miniforge3/bin:{{ ansible_env.PATH }}"
    HOME: /home/user
  changed_when: false
  ignore_errors: yes
