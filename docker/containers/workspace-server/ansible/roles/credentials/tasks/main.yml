---
# Credentials and authentication setup

- name: Apply WORKSPACE_NAME templating
  block:
    - name: Get WORKSPACE_NAME from environment
      ansible.builtin.set_fact:
        ws_name: "{{ lookup('env', 'WORKSPACE_NAME') | default(workspace_name) }}"

    - name: Template WORKSPACE_NAME in configuration files
      ansible.builtin.shell: |
        find /home/user /home/user/.vscode-server /home/user/workspace \
            \( -name "*.json" -o -name "*.code-workspace" \) -maxdepth 4 2>/dev/null \
            | xargs sed -i "s/{{ '{{' }}WORKSPACE_NAME{{ '}}' }}/{{ ws_name }}/g" 2>/dev/null || true
      changed_when: false

    - name: Rename workspace file
      ansible.builtin.shell: |
        for ws in /home/user/*.code-workspace; do
            [ -f "$ws" ] || continue
            target="/home/user/{{ ws_name }}.code-workspace"
            [ "$ws" = "$target" ] || mv "$ws" "$target" 2>/dev/null || true
        done
      changed_when: false

- name: Setup Claude credentials
  block:
    - name: Get CLAUDE_CODE_OAUTH_TOKEN
      ansible.builtin.set_fact:
        claude_token: "{{ lookup('env', 'CLAUDE_CODE_OAUTH_TOKEN') }}"

    - name: Get ANTHROPIC_API_KEY
      ansible.builtin.set_fact:
        anthropic_api_key: "{{ lookup('env', 'ANTHROPIC_API_KEY') }}"

    - name: Create Claude OAuth credentials
      ansible.builtin.shell: |
        su -s /bin/bash user -c "
          mkdir -p /home/user/.claude
          printf '{\"claudeAiOAuth\":{\"accessToken\":\"%s\",\"expiresAt\":9999999999,\"refreshToken\":null,\"scopes\":null,\"tokenType\":\"Bearer\"}}\n' \
              '{{ claude_token }}' > /home/user/.claude/.credentials.json
          chmod 600 /home/user/.claude/.credentials.json
        "
      when: claude_token | length > 0
      changed_when: false

    - name: Write ANTHROPIC_API_KEY to user shell environment
      ansible.builtin.shell: |
        su -s /bin/bash user -c "
          mkdir -p /home/user/.claude
          # Write to .profile for SSH sessions
          sed -i '/^export ANTHROPIC_API_KEY=/d' /home/user/.profile 2>/dev/null || true
          echo 'export ANTHROPIC_API_KEY={{ anthropic_api_key }}' >> /home/user/.profile
          # Write to .claude/.env for Claude Code direct reads
          printf 'ANTHROPIC_API_KEY={{ anthropic_api_key }}\n' > /home/user/.claude/.env
          chmod 600 /home/user/.claude/.env
        "
      when: anthropic_api_key | length > 0
      changed_when: false

- name: Setup GitHub credentials
  block:
    - name: Get GITHUB_PERSONAL_ACCESS_TOKEN
      ansible.builtin.set_fact:
        github_token: "{{ lookup('env', 'GITHUB_PERSONAL_ACCESS_TOKEN') }}"

    - name: Authenticate with GitHub
      ansible.builtin.shell: |
        su -s /bin/bash user -c "
          export HOME=/home/user
          export NVM_DIR={{ install_prefix }}/.nvm
          [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
          export PATH={{ install_prefix }}/.local/bin:{{ install_prefix }}/.npm-global/bin:{{ install_prefix }}/.dotnet:{{ install_prefix }}/.dotnet/tools:{{ install_prefix }}/miniforge3/bin:\$PATH
          echo '{{ github_token }}' | gh auth login --with-token 2>/dev/null || true
          gh extension upgrade --all 2>/dev/null || true
          git config --global credential.https://github.com.helper store
          if ! grep -qF github.com /home/user/.git-credentials 2>/dev/null; then
              printf 'https://x-access-token:%s@github.com\n' '{{ github_token }}' >> /home/user/.git-credentials
          fi
          chmod 600 /home/user/.git-credentials
        "
      args:
        executable: /bin/bash
      when: github_token | length > 0
      changed_when: false
      ignore_errors: yes

- name: Setup Azure DevOps credentials
  block:
    - name: Get ADO_MCP_AUTH_TOKEN
      ansible.builtin.set_fact:
        ado_token: "{{ lookup('env', 'ADO_MCP_AUTH_TOKEN') }}"

    - name: Configure Azure DevOps authentication
      ansible.builtin.shell: |
        su -s /bin/bash user -c "
          git config --global credential.https://dev.azure.com.helper store
          if ! grep -qF dev.azure.com /home/user/.git-credentials 2>/dev/null; then
              printf 'https://anything:%s@dev.azure.com\n' '{{ ado_token }}' >> /home/user/.git-credentials
          fi
          chmod 600 /home/user/.git-credentials
        "
      when: ado_token | length > 0
      changed_when: false

- name: Install Claude Code plugins
  ansible.builtin.shell: |
    export HOME=/home/user
    export NVM_DIR={{ install_prefix }}/.nvm
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    export PATH={{ install_prefix }}/.local/bin:{{ install_prefix }}/.npm-global/bin:{{ install_prefix }}/.dotnet:{{ install_prefix }}/.dotnet/tools:{{ install_prefix }}/miniforge3/bin:$PATH

    claude plugin marketplace add https://github.com/zzaia/zzaia-agentic-workspace.git#feature/improve-agentic-system 2>/dev/null || true
    claude plugin install agentic-workspace@zzaia 2>/dev/null || true
  args:
    executable: /bin/bash
  environment:
    NVM_DIR: "{{ install_prefix }}/.nvm"
    PATH: "{{ install_prefix }}/.local/bin:{{ install_prefix }}/.npm-global/bin:{{ install_prefix }}/.dotnet:{{ install_prefix }}/.dotnet/tools:{{ install_prefix }}/miniforge3/bin:{{ ansible_env.PATH }}"
    HOME: /home/user
  changed_when: false
  ignore_errors: yes
