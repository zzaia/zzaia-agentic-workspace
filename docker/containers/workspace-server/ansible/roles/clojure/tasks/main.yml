---
# Clojure installation via official installer

- meta: end_role
  when: not (clojure_enabled | bool)

- name: Download Clojure installer
  ansible.builtin.shell: |
    curl -sSLo /tmp/linux-install.sh https://download.clojure.org/install/linux-install.sh
    chmod +x /tmp/linux-install.sh
  args:
    creates: /tmp/linux-install.sh
    executable: /bin/bash
  changed_when: false

- name: Install Clojure
  ansible.builtin.shell: |
    bash /tmp/linux-install.sh
  args:
    executable: /bin/bash
    creates: /usr/local/bin/clojure
  changed_when: false
