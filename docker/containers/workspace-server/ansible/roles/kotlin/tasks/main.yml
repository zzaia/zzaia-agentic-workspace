---
# Kotlin installation via SDKMAN

- meta: end_role
  when: not (kotlin_enabled | bool)

- name: Create SDKMAN directory
  ansible.builtin.file:
    path: "{{ install_prefix }}/.sdkman"
    owner: user
    group: user
    mode: "0755"
    state: directory

- name: Install SDKMAN
  ansible.builtin.shell: |
    curl -s "https://get.sdkman.io?rcupdate=false" | bash
  args:
    executable: /bin/bash
    creates: "{{ install_prefix }}/.sdkman/bin/sdkman-init.sh"
  environment:
    SDKMAN_DIR: "{{ install_prefix }}/.sdkman"
    HOME: /home/user
  changed_when: false

- name: Install Kotlin via SDKMAN
  ansible.builtin.shell: |
    export SDKMAN_DIR="{{ install_prefix }}/.sdkman"
    [ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
    sdk install kotlin {{ kotlin_version }} < <(echo "y") 2>&1 || true
  args:
    executable: /bin/bash
  environment:
    SDKMAN_DIR: "{{ install_prefix }}/.sdkman"
    HOME: /home/user
  changed_when: false
