---
# PHP installation with Composer

- meta: end_role
  when: not (php_enabled | bool)

- name: Add sury.org GPG key
  ansible.builtin.shell: |
    curl -sSLo /usr/share/keyrings/sury-php.gpg https://packages.sury.org/php/apt.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/sury-php.gpg
  changed_when: false

- name: Add PHP apt repository
  ansible.builtin.copy:
    content: "deb [signed-by=/usr/share/keyrings/sury-php.gpg] https://packages.sury.org/php/ {{ ansible_distribution_release }} main\n"
    dest: /etc/apt/sources.list.d/sury-php.list
    mode: "0644"

- name: Install PHP
  ansible.builtin.apt:
    name:
      - "php{{ php_version }}-cli"
      - "php{{ php_version }}-common"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-mbstring"
    state: present
    update_cache: yes

- name: Install Composer
  ansible.builtin.shell: |
    curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  args:
    executable: /bin/bash
    creates: /usr/local/bin/composer
  changed_when: false
