---
# Play 1: System setup and user creation (as root — entrypoint runs as root, no become needed)
- name: System and user setup
  hosts: local
  gather_facts: yes
  roles:
    - { role: system, tags: [system] }
    - user-setup

# Play 2: Root-level SDK installation (must run with become: true for package managers)
- name: Root-level SDK installation
  hosts: local
  gather_facts: no
  roles:
    - java
    - lua
    - cpp
    - clojure
    - php

# Play 3: User-level tool installation
- name: User-level tool installation
  hosts: local
  become: yes
  become_user: user
  gather_facts: no
  roles:
    - vscode-cli
    - node
    - node-frontend
    - dotnet
    - python
    - cli
    - rust
    - go
    - kotlin
    - ruby
    - swift
    - path-config

# Play 4: Root-level post-installation (credentials, GPU — entrypoint runs as root, no become needed)
- name: Root-level post-installation
  hosts: local
  gather_facts: no
  roles:
    - credentials
    - gpu
