# secret-template.yaml — SSH authorized keys for the zzaia container user.
#
# Setup:
#   1. Generate a dedicated SSH key:
#        ssh-keygen -t ed25519 -f zzaia_key -N ""
#   2. Copy this file to secret.yaml (already in .gitignore):
#        cp docker/k8s/secret-template.yaml docker/k8s/secret.yaml
#   3. Replace the placeholder below with the contents of zzaia_key.pub
#   4. Apply: kubectl apply -f docker/k8s/secret.yaml
#   5. Connect: ssh -i zzaia_key -p 2222 zzaia@<node-ip>
#              (or via port-forward: kubectl port-forward svc/zzaia-workspace 2222:2222 -n zzaia)
#
# NEVER commit secret.yaml to git.
apiVersion: v1
kind: Secret
metadata:
  name: zzaia-ssh-keys
  namespace: zzaia
type: Opaque
stringData:
  authorized_keys: |
    ssh-ed25519 AAAA_REPLACE_WITH_YOUR_PUBLIC_KEY user@host
