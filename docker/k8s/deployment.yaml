apiVersion: apps/v1
kind: Deployment
metadata:
  name: zzaia-workspace
  namespace: zzaia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zzaia-workspace
  template:
    metadata:
      labels:
        app: zzaia-workspace
    spec:
      # ── Host isolation ────────────────────────────────────────────────────
      automountServiceAccountToken: false
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        fsGroup: 1000
      # ── Container ─────────────────────────────────────────────────────────
      containers:
        - name: zzaia
          image: zzaia-workspace:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2222
              protocol: TCP
          securityContext:
            runAsNonRoot: false     # sshd must start as root to bind and switch users
            allowPrivilegeEscalation: true  # required for sshd setuid to zzaia(1000)
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
              add:
                - AUDIT_WRITE   # sshd audit logging
                - CHOWN         # sshd file ownership
                - FOWNER        # sshd filesystem operations
                - SETGID        # sshd user switching
                - SETUID        # sshd user switching
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "4"
          livenessProbe:
            tcpSocket:
              port: 2222
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: ssh-authorized-keys
              mountPath: /home/zzaia/.ssh/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: workspace
              mountPath: /home/zzaia/workspace
      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: ssh-authorized-keys
          secret:
            secretName: zzaia-ssh-keys
            defaultMode: 0600
        - name: workspace
          emptyDir: {}   # ephemeral; use PersistentVolumeClaim for persistence
