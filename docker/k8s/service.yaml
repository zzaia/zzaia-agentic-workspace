apiVersion: v1
kind: Service
metadata:
  name: zzaia-workspace
  namespace: zzaia
spec:
  selector:
    app: zzaia-workspace
  ports:
    - name: ssh
      port: 2222
      targetPort: 2222
      protocol: TCP
    - name: code-server
      port: 8080
      targetPort: 8080
      protocol: TCP
  # ClusterIP for internal-only access; change to LoadBalancer for external.
  # SSH:         kubectl port-forward svc/zzaia-workspace 2222:2222 -n zzaia
  # code-server: kubectl port-forward svc/zzaia-workspace 8080:8080 -n zzaia
  type: ClusterIP
