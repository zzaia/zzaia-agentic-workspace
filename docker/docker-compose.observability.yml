# docker-compose.observability.yml — Observability override: merge with docker-compose.yml to enable SigNoz stack
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.observability.yml -p "$WORKSPACE_NAME" up -d
# Requirements:
#   - Docker host must have /var/lib/docker/containers accessible (standard Docker Engine)
#   - Minimum 4 GB RAM recommended for SigNoz + ClickHouse

services:
  # Override bifrost-server to wait for SigNoz OTel collector and enable OTEL
  bifrost-server:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=bifrost-server
    depends_on:
      signoz-otel-collector:
        condition: service_healthy

  # Override ml-server to wait for SigNoz OTel collector and enable OTEL
  ml-server:
    environment:
      - HEADROOM_OTEL_METRICS_ENABLED=1
      - HEADROOM_OTEL_METRICS_EXPORTER=otlp_http
      - HEADROOM_OTEL_METRICS_ENDPOINT=http://signoz-otel-collector:4318/v1/metrics
      - HEADROOM_OTEL_SERVICE_NAME=ml-server
      - HEADROOM_LANGFUSE_ENABLED=false
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=ml-server
    depends_on:
      signoz-otel-collector:
        condition: service_healthy

  mcp-tavily:
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-tavily
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3001,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(0))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-azure-devops:
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-azure-devops
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3002,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(0))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-postman:
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-postman
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3003,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(0))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-newrelic:
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-newrelic
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3004,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(0))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-github:
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-github
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3005,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(0))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-playwright:
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-playwright
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3006,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-headroom:
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-headroom
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3008,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mcp-signoz:
    build:
      context: ..
      dockerfile: docker/containers/mcp-signoz/Dockerfile
    image: zzaia-mcp-signoz:latest
    environment:
      - NODE_PATH=/usr/local/lib/node_modules
      - NODE_OPTIONS=--require @opentelemetry/auto-instrumentations-node/register
      - OTEL_NODE_RESOURCE_DETECTORS=env,host,os,process,container
      - SIGNOZ_URL=http://signoz-server:8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=mcp-signoz
    networks:
      - mcp
    ports:
      - "127.0.0.1:${MCP_SIGNOZ_PORT:-3009}:3009"
    volumes:
      - signoz-mcp-creds:/signoz-data:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    healthcheck:
      test: ["CMD-SHELL", "NODE_OPTIONS= node -e \"const net=require('net');const s=net.connect(3009,'127.0.0.1',()=>{s.destroy();process.exit(0)}).on('error',()=>process.exit(0))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      signoz-server:
        condition: service_healthy
      signoz-otel-collector:
        condition: service_healthy

  workspace-server:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=workspace-server

  git-sidecar:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=git-sidecar

  vscode-sidecar:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=vscode-sidecar

  jupyter-sidecar:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=jupyter-sidecar

  containers-dev-sidecar:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=containers-dev-sidecar

  tunnel-sidecar:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=tunnel-sidecar

  signoz-schema-migrator:
    image: signoz/signoz-schema-migrator:v0.144.5
    container_name: signoz-schema-migrator
    command:
      - "sync"
      - "--dsn=tcp://signoz-db:9000/?username=default&password=signoz"
      - "--replication=false"
    networks:
      - mcp
    depends_on:
      signoz-db:
        condition: service_healthy
    restart: "no"

  signoz-schema-patch:
    image: clickhouse/clickhouse-server:25.5
    container_name: signoz-schema-patch
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for tbl in span_attributes span_attributes_keys distributed_span_attributes distributed_span_attributes_keys; do
          clickhouse client --host signoz-db --user default --password signoz \
            -q "ALTER TABLE signoz_traces.$${tbl} ON CLUSTER cluster MODIFY COLUMN tagType Enum8('tag'=1,'resource'=2,'scope'=3)" 2>/dev/null && echo "Patched signoz_traces.$${tbl}" || echo "Skip $${tbl} (already patched or missing)"
        done
    networks:
      - mcp
    depends_on:
      signoz-db:
        condition: service_healthy
      signoz-schema-migrator:
        condition: service_completed_successfully
    restart: "no"

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:v0.144.5
    container_name: signoz-otel-collector
    command:
      - "--config=/etc/otel/config.yaml"
      - "--clickhouse-dsn=tcp://signoz-db:9000/?username=default&password=signoz"
      - "--clickhouse-replication=false"
    volumes:
      - ./signoz-otel-collector-config.yaml:/etc/otel/config.yaml:ro
    networks:
      - mcp
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      signoz-db:
        condition: service_healthy
      signoz-schema-migrator:
        condition: service_completed_successfully
      signoz-schema-patch:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "bash", "-c", "echo >/dev/tcp/localhost/13133"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  signoz-server:
    build:
      context: ..
      dockerfile: docker/containers/signoz-server/Dockerfile
    image: zzaia-signoz-server:latest
    container_name: signoz
    networks:
      - mcp
    ports:
      - "127.0.0.1:${SIGNOZ_PORT:-3301}:8080"
    environment:
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-db:9000?username=default&password=signoz
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:-changeme-set-SIGNOZ_JWT_SECRET-in-env}
      - WORKSPACE_NAME=${WORKSPACE_NAME}
      - SIGNOZ_ADMIN_EMAIL=${SIGNOZ_ADMIN_EMAIL:-admin@${WORKSPACE_NAME}.local}
      - SIGNOZ_ADMIN_PASSWORD=${SIGNOZ_ADMIN_PASSWORD:-Admin@zzaia1234!}
    volumes:
      - signoz-data:/var/lib/signoz
      - signoz-mcp-creds:/signoz-data
    depends_on:
      signoz-db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  signoz-db:
    image: clickhouse/clickhouse-server:25.5
    container_name: signoz-db
    networks:
      - mcp
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: signoz
    volumes:
      - signoz-db-data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse-users.xml:/etc/clickhouse-server/users.d/experimental.xml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--user=default", "--password=signoz", "-qO-", "http://localhost:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  observability-fluent-bit:
    image: fluent/fluent-bit:5.0.7
    container_name: fluent-bit
    networks:
      - mcp
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit-parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit-docker-meta.lua:/fluent-bit/etc/fluent-bit-docker-meta.lua:ro
      - fluent-bit-state:/var/lib/fluent-bit/state
    environment:
      - WORKSPACE_NAME=${WORKSPACE_NAME}
    depends_on:
      signoz-otel-collector:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "/fluent-bit/bin/fluent-bit", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  observability-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - mcp
    depends_on:
      signoz-otel-collector:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  observability-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    networks:
      - mcp
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  signoz-data:
    name: ${WORKSPACE_NAME:-zzaia}-signoz-data
  signoz-mcp-creds:
    name: ${WORKSPACE_NAME:-zzaia}-signoz-mcp-creds
  signoz-db-data:
    name: ${WORKSPACE_NAME:-zzaia}-signoz-db-data
  fluent-bit-state:
    name: ${WORKSPACE_NAME:-zzaia}-fluent-bit-state
