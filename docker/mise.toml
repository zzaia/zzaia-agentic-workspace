[tools]
gh = "latest"
tmux = "latest"
node = "22"
dotnet = "10"
k6 = "latest"
d2 = "latest"
dapr = "latest"
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@mermaid-js/mermaid-cli" = "latest"
"npm:@openai/codex" = "latest"
"npm:supergateway" = "latest"
"npm:@google/gemini-cli" = "latest"

[settings]
experimental = true

[tasks.install-git]
description = "Install git via apt"
run = "sudo apt-get update && sudo apt-get install -y --no-install-recommends git"

[tasks.install-azure-cli]
description = "Install Azure CLI via official Microsoft script"
run = """
curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
"""

[tasks.install-tectonic]
description = "Install tectonic typesetting binary"
run = """
curl --proto '=https' --tlsv1.2 -fsSL https://drop.tectonic-typesetting.org/install.sh | sh
"""

[tasks.python-packages]
description = "Install required Python packages"
run = "pip install pypdf python-docx textual jinja2 graphviz diagrams"

[tasks.conda-envs]
description = "Create conda environments for analytics and development workflows"
run = """
conda create -n venv-analytics python=3.12 -y || true
conda create -n venv-development python=3.12 -y || true
"""

[tasks.dotnet-tools]
description = "Install .NET workloads and global tools"
run = """
dotnet workload install aspire || true
dotnet tool install -g aspirate || dotnet tool update -g aspirate || true
"""

[tasks.system-packages]
description = "Install system packages (local dev — not needed in Docker)"
run = """
sudo apt-get install -y tmux plantuml tectonic
"""

[tasks.claude-plugins]
description = "Register Claude Code marketplace (plugin apply happens at container start via entrypoint)"
run = """
claude plugin marketplace add https://github.com/zzaia/zzaia-agentic-workspace.git#feature/improve-agentic-system || true
claude plugin sync || true
claude plugin remove claude-plugins-official || true
"""

[tasks.gh-extensions]
description = "Install gh CLI extensions baked into the image"
run = "gh extension install github/gh-copilot 2>/dev/null || true"

[tasks.rtk]
description = "Install RTK (Rust Token Killer) binary for token compression"
run = """
_RTK_VER=$(curl -fsSL https://api.github.com/repos/rtk-ai/rtk/releases/latest \
    | grep '"tag_name"' | sed 's/.*"v//;s/".*//') \
&& mkdir -p "${HOME}/.local/bin" \
&& curl -fsSL "https://github.com/rtk-ai/rtk/releases/download/v${_RTK_VER}/rtk-x86_64-unknown-linux-musl.tar.gz" \
    | tar xz -C "${HOME}/.local/bin" rtk \
&& chmod +x "${HOME}/.local/bin/rtk"
"""

[tasks.vscode-extensions]
description = "Install VS Code extensions at build time (code-server must already be present)"
run = """
VSCODE_CLI=$(find "${HOME}/.vscode" -name code-server -type f 2>/dev/null | head -1)
if [ -z "$VSCODE_CLI" ]; then
    echo "INFO: code-server not found yet; skipping extension installation for now."
    exit 0
fi
# Sentinel includes CLI version so it's invalidated when the image is rebuilt with a new VS Code version
EXT_SENTINEL="${HOME}/.vscode-server/.extensions-installed"
_CLI_VER=$("$VSCODE_CLI" --version 2>/dev/null | head -1 || echo "unknown")
[ -f "$EXT_SENTINEL" ] && [ "$(cat "$EXT_SENTINEL")" = "$_CLI_VER" ] && exit 0
EXT_DIR="${HOME}/.vscode-server/extensions"
mkdir -p "$EXT_DIR"
_install_ext() {
    local ext="$1" attempt=1 max=5 delay=10
    while [ "$attempt" -le "$max" ]; do
        out=$("$VSCODE_CLI" --extensions-dir "$EXT_DIR" --install-extension "$ext" --target linux-x64 2>&1)
        if echo "$out" | grep -qiE "successfully installed|already installed"; then
            echo "$out" | grep -v "already installed" || true
            return 0
        fi
        echo "WARN: extension $ext attempt $attempt/$max failed; retrying in ${delay}s..." >&2
        sleep "$delay"
        attempt=$(( attempt + 1 ))
        delay=$(( delay * 2 ))
    done
    echo "WARN: extension $ext could not be installed after $max attempts; continuing." >&2
}
for ext in \
    teabyii.ayu coderholiclt.night-owl miguelsolorio.fluent-icons \
    pkief.material-product-icons vscode-icons-team.vscode-icons \
    anthropic.claude-code \
    alefragnani.project-manager codeinklingon.git-worktree-menu \
    eamodio.gitlens editorconfig.editorconfig esbenp.prettier-vscode \
    fullstackspider.visual-nuget gaoshan0621.csharp-format-usings \
    github.copilot github.copilot-chat \
    google.geminicodeassist google.gemini-cli-vscode-ide-companion openai.chatgpt \
    gruntfuggly.todo-tree kreativ-software.csharpextensions \
    mermaidchart.vscode-mermaid-chart ms-azure-devops.azure-pipelines \
    ms-dotnettools.csdevkit ms-dotnettools.csharp ms-dotnettools.vscode-dotnet-runtime \
    ms-python.debugpy ms-python.python ms-python.vscode-pylance \
    ms-python.vscode-python-envs ms-toolsai.jupyter ms-toolsai.jupyter-keymap \
    ms-toolsai.jupyter-renderers ms-toolsai.vscode-jupyter-cell-tags \
    ms-toolsai.vscode-jupyter-slideshow orsenkucher.vscode-graphql \
    redhat.vscode-xml redhat.vscode-yaml streetsidesoftware.code-spell-checker \
    tamasfe.even-better-toml ms-vscode.vscode-websearchforcopilot \
    tomblind.scm-buttons-vscode vscodevim.vim; do
    _install_ext "$ext"
done
echo "$_CLI_VER" > "$EXT_SENTINEL" || true
"""

[tasks.install]
description = "Full workspace setup — tools, packages, and environments (local dev; system-packages requires sudo)"
depends = ["python-packages", "conda-envs", "dotnet-tools", "claude-plugins"]
