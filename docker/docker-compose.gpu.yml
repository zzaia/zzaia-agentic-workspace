# docker-compose.gpu.yml — GPU override: merge with docker-compose.yml to enable GPU support
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.gpu.yml -p "$WORKSPACE_NAME" up -d
# Requirements:
#   - Native Docker Engine (not ECI/Fargate) — DinD GPU requires privileged + direct device access
#   - NVIDIA GPU driver installed on host
#   - NVIDIA Container Toolkit installed: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#     Install: distribution=$(. /etc/os-release;echo $ID$VERSION_ID)
#              curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
#              curl -s -L https://nvidia.github.io/libnvidia-container/$distribution/libnvidia-container.list | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
#              sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
#              sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker

services:
  dind-server:
    environment:
      - GPU_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  ml-server:
    build:
      args:
        GPU_ENABLED: "true"
    environment:
      - GPU_ENABLED=true
      - HEADROOM_KOMPRESS_BACKEND=pytorch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  workspace-server:
    environment:
      - GPU_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vscode-sidecar:
    environment:
      - GPU_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  containers-dev-sidecar:
    environment:
      - GPU_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  jupyter-sidecar:
    environment:
      - GPU_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
